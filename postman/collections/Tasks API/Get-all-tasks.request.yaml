$kind: http-request
name: 'GET all tasks'
method: GET
url: '{{baseUrl}}/api/tasks'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', () => pm.response.to.have.status(200));
      pm.test('Response is JSON', () => pm.response.to.be.json);
      pm.test('Returns an array (or tasks field)', () => {
        const data = pm.response.json();
        pm.expect(data).to.satisfy(d => Array.isArray(d) || Array.isArray(d.tasks));
      });
