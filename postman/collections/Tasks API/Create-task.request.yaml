$kind: http-request
name: 'Create task'
method: POST
url: '{{baseUrl}}/api/tasks'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Sample task",
      "description": "Created from Postman"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201 or 200', () => pm.expect(pm.response.code).to.be.oneOf([200, 201]));
      pm.test('Response is JSON', () => pm.response.to.be.json);
